name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Audit dependencies
        run: |
          python -m pip install pip-audit
          pip-audit

      - name: Run linting
        run: ruff check .
      
      - name: Run type checking
        run: mypy src/
      
      - name: Run tests with coverage
        run: pytest --cov=validibot_cli --cov-report=term-missing
      
      - name: Test CLI installation
        run: |
          validibot --version
          validibot --help

  deps:
    name: deps (lock + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Verify the lockfile is in sync with pyproject.toml
        # Fails if uv.lock has drifted from pyproject (e.g. a dependency was
        # changed without re-locking) so the committed lock can't silently rot.
        run: uv lock --check
      - name: Audit the locked dependency set for known vulnerabilities
        # Audits the EXACT resolved versions in uv.lock — not a fresh
        # floors-resolved set — so a CVE pinned in the lock is caught here even
        # when a clean install would pull a fixed version.
        run: |
          uv export --frozen --no-emit-project \
            --format requirements-txt -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [test, deps]
    steps:
      - run: echo "All checks passed."
